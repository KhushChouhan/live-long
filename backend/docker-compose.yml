version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    restart: always
    environment:
      POSTGRES_DB: healthcare_app
      POSTGRES_USER: khushwant
      POSTGRES_PASSWORD: Khushwantsingh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: healthcare_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthcare_app
      - DB_USER=khushwant
      - DB_PASS=Khushwantsingh
      - JWT_ACCESS_SECRET=supersecretaccesskey1234567890!@#$
      - JWT_REFRESH_SECRET=supersecretrefreshkey0987654321!@#$
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - OTP_EXPIRATION_MINUTES=5
      - OTP_MAX_ATTEMPTS=3
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - db

volumes:
  pgdata:
